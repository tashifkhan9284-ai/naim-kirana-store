<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Naim Kirana Store</title>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}header{background:#2e7d32;color:#fff;padding:15px;text-align:center}
#search{width:90%;max-width:500px;padding:10px;margin:15px auto;display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;padding:15px}
.card{background:#fff;border-radius:8px;padding:10px;box-shadow:0 2px 5px #ccc;text-align:center}
button{padding:8px 12px}
</style></head>
<body>
<header><h1>Naim Kirana Store</h1><p>All Daily Needs Available</p></header>
<input id="search" placeholder="Search products...">
<div class="grid" id="grid"></div>
<script>
let products=[
{name:"Toothpaste"},{name:"Toothbrush"},{name:"Soap"},{name:"Surf"},
{name:"Cookies"},{name:"Bread"},{name:"Butter"},{name:"Buns"},
{name:"Khari"},{name:"Chocolate"},{name:"Candy"},{name:"Ponds Powder"},
{name:"Vicco Cream"},{name:"Fair & Lovely"},{name:"Nisha Mehndi"},
{name:"Zandu Balm"},{name:"Mini Shampoo"}
];
const grid=document.getElementById("grid");
function show(list){grid.innerHTML="";list.forEach(p=>{grid.innerHTML+=`<div class='card'><h3>${p.name}</h3><p>Available</p><button>Enquiry</button></div>`})}
show(products);
search.oninput=e=>show(products.filter(p=>p.name.toLowerCase().includes(e.target.value.toLowerCase())));
</script></body></html>
